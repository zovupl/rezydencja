<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0d0f;--bg2:#131417;--panel:#16181c;--ink:#f2eee5;--muted:#a9a396;--line:rgba(201,168,106,.22);--gold:#c9a86a;--gold2:#e4cf9c;--stone:#8a8378;--serif:'Playfair Display',Georgia,serif;--sans:'Manrope',system-ui,sans-serif}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.wrap{max-width:1240px;margin:0 auto;padding:0 32px}
.eyebrow{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:600}
h1{font-family:var(--serif);font-weight:500;line-height:1.1}
.btn{display:inline-flex;align-items:center;gap:10px;padding:13px 26px;border-radius:2px;font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:.35s;border:1px solid var(--line);color:var(--ink)}
.btn:hover{border-color:var(--gold);color:var(--gold)}

header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,11,13,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:14px 0}
.nav{display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;flex-direction:column;line-height:1}
.brand b{font-family:var(--serif);font-size:22px;font-weight:600}
.brand span{font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);margin-top:5px}
.nav-links{display:flex;gap:34px;align-items:center}
.nav-links a{font-size:13px;letter-spacing:.08em;color:var(--muted);transition:.25s;font-weight:500}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:18px}
.lang{display:flex;border:1px solid var(--line);border-radius:2px;overflow:hidden}
.lang button{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.06em;padding:7px 11px;cursor:pointer;transition:.25s}
.lang button.active{background:var(--gold);color:#1a1408}
.lang button:hover:not(.active){color:var(--ink)}

.ghead{padding:150px 0 40px;text-align:center}
.ghead .eyebrow{display:block;margin-bottom:16px}
.ghead h1{font-size:clamp(34px,5vw,58px)}
.ghead p{color:var(--muted);font-weight:300;margin-top:16px;font-size:16px}

.gal-wrap{padding:20px 0 90px}
.gallery{columns:4;column-gap:14px}
.gitem{break-inside:avoid;margin-bottom:14px;position:relative;overflow:hidden;border-radius:2px;cursor:pointer;background:var(--panel)}
.gitem img{width:100%;transition:.6s ease}
.gitem::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,9,11,.5),transparent 55%);opacity:0;transition:.4s}
.gitem:hover img{transform:scale(1.05)}
.gitem:hover::after{opacity:1}
.gitem .plus{position:absolute;right:14px;bottom:12px;color:#fff;opacity:0;transition:.4s;z-index:2;font-size:22px;font-family:var(--serif)}
.gitem:hover .plus{opacity:1}

.backbar{text-align:center;margin-top:50px}

.lb{position:fixed;inset:0;background:rgba(6,7,9,.96);z-index:1000;display:none;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:86vh;object-fit:contain;box-shadow:0 40px 120px rgba(0,0,0,.7);border-radius:2px}
.lb-close{position:absolute;top:20px;right:28px;background:none;border:none;color:#fff;font-size:34px;cursor:pointer;line-height:1;opacity:.85}
.lb-close:hover{opacity:1;color:var(--gold)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);color:#fff;width:54px;height:54px;border-radius:50%;font-size:22px;cursor:pointer;transition:.3s}
.lb-nav:hover{background:var(--gold);color:#1a1408;border-color:var(--gold)}
.lb-prev{left:28px}.lb-next{right:28px}
.lb-count{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:var(--muted);font-size:13px;letter-spacing:.12em}

footer{background:#08090b;border-top:1px solid var(--line);padding:34px 0}
.foot-copy{font-size:12px;color:var(--stone);text-align:center}

@media(max-width:1024px){.gallery{columns:3}.nav-links{display:none}}
@media(max-width:760px){.wrap{padding:0 18px}.gallery{columns:2}.ghead{padding:120px 0 30px}.lb-nav{width:44px;height:44px}.lb-prev{left:10px}.lb-next{right:10px}}
@media(max-width:460px){.gallery{columns:1}}

    <a href="index.html#top" class="brand">

    <nav class="nav-links">
      <a href="index.html#about" data-i18n="nav_about">Rezydencja</a>
      <a href="index.html#features" data-i18n="nav_features">Atuty</a>
      <a href="gallery.html" class="active" data-i18n="nav_gallery">Galeria</a>
      <a href="index.html#location" data-i18n="nav_location">Lokalizacja</a>
      <a href="index.html#contact" data-i18n="nav_contact">Kontakt</a>

    <div class="nav-right">
      <div class="lang" id="lang">
        <button data-lang="es" class="active">ES</button>
        <button data-lang="ru">RU</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </div>
</header>

<section class="ghead">

    <span class="eyebrow" data-i18n="gal_eyebrow">Galeria</span>
    <h1 data-i18n="gal_h">Galeria rezydencji</h1>
    <p data-i18n="gal_page_p">Kliknij zdjęcie, aby powiększyć. Strzałki lub Esc do nawigacji.</p>
  </div>
</section>

<div class="gal-wrap">
  <div class="wrap">
    <div class="gallery" id="grid"></div>
    <div class="backbar"><a href="index.html#top" class="btn" data-i18n="gal_back">Powrót do strony głównej</a></div>
  </div>
</div>

<footer><div class="wrap"><div class="foot-copy" data-i18n="foot_copy">© 2026 ZOVU. Wszelkie prawa zastrzeżone.</div></div></footer>

<div class="lb" id="lb">
  <button class="lb-close" id="lbClose">×</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-count" id="lbCount"></div>
</div>

<script>
const I18N={
es:{brand:"Residencia Barcelona",brandsub:"Colección de propiedades premium",nav_about:"Residencia",nav_features:"Características",nav_gallery:"Galería",nav_location:"Ubicación",nav_contact:"Contacto",gal_eyebrow:"Galería",gal_h:"Galería de la residencia",gal_page_p:"Haz clic en cualquier foto para ampliarla. Flechas o Esc para navegar.",gal_back:"Volver al inicio",foot_copy:"© 2026 ZOVU. Todos los derechos reservados."},
en:{brand:"Barcelona Residence",brandsub:"Premium property collection",nav_about:"Residence",nav_features:"Highlights",nav_gallery:"Gallery",nav_location:"Location",nav_contact:"Contact",gal_eyebrow:"Gallery",gal_h:"Residence gallery",gal_page_p:"Click any photo to enlarge. Arrow keys or Esc to navigate.",gal_back:"Back to home",foot_copy:"© 2026 ZOVU. All rights reserved."},
ru:{brand:"Резиденция Барселона",brandsub:"Коллекция премиум-недвижимости",nav_about:"Резиденция",nav_features:"Особенности",nav_gallery:"Галерея",nav_location:"Расположение",nav_contact:"Контакты",gal_eyebrow:"Галерея",gal_h:"Галерея резиденции",gal_page_p:"Нажмите на любое фото, чтобы увеличить. Стрелки или Esc для навигации.",gal_back:"На главную",foot_copy:"© 2026 ZOVU. Все права защищены."}
};
function applyLang(lang){const d=I18N[lang];if(!d)return;document.documentElement.lang=lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(d[k]!=null)el.textContent=d[k];});
  document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  try{localStorage.setItem('rez_lang',lang)}catch(e){}}
document.querySelectorAll('#lang button').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));
applyLang((()=>{try{return localStorage.getItem('rez_lang')}catch(e){return null}})()||'es');

/* order: lead with the strongest shots, then the rest */
const ORDER=[49,31,25,45,1,17,24,44,50,42,41,36,16,11,9,2,43,46,39,40,10,38,37,33,30,35,23,20,26,27,29,12,13,22,15,8,18,19,21,28,32,34,47,48,3,4,5,6,7,14];
const N=ORDER.length;const grid=document.getElementById('grid');
let html='';ORDER.forEach((p,idx)=>{html+=`<div class="gitem" data-idx="${idx}"><img loading="lazy" src="assets/thumb/${p}.jpg" alt="Rezydencja ${idx+1}"><span class="plus">+</span></div>`;});
grid.innerHTML=html;

const lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbCount=document.getElementById('lbCount');let cur=0;
function openLB(i){cur=i;lbImg.src=`assets/full/${ORDER[i]}.jpg`;lbCount.textContent=`${i+1} / ${N}`;lb.classList.add('open');document.body.style.overflow='hidden';}
function closeLB(){lb.classList.remove('open');document.body.style.overflow='';}
function nav(d){cur=(cur+d+N)%N;lbImg.src=`assets/full/${ORDER[cur]}.jpg`;lbCount.textContent=`${cur+1} / ${N}`;}
grid.querySelectorAll('.gitem').forEach(el=>el.addEventListener('click',()=>openLB(+el.dataset.idx)));
document.getElementById('lbClose').addEventListener('click',closeLB);
document.getElementById('lbPrev').addEventListener('click',e=>{e.stopPropagation();nav(-1)});
document.getElementById('lbNext').addEventListener('click',e=>{e.stopPropagation();nav(1)});
lb.addEventListener('click',e=>{if(e.target===lb)closeLB()});
addEventListener('keydown',e=>{if(!lb.classList.contains('open'))return;if(e.key==='Escape')closeLB();if(e.key==='ArrowLeft')nav(-1);if(e.key==='ArrowRight')nav(1);});
</script>
</body>
